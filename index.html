<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Lists</title>
</head>

<body>
    <h2>An ordered HTML list:</h2>
    <ol>
        <li>JAVA</li>
        <li>PYTHON</li>
        <li>DBMS</li>
        <li>SQL</li>
    </ol>

    <h2>An unordered HTML list:</h2>
    <ul>
        <li>REACT</li>
        <li>HTML</li>
        <li>CSS</li>
        <li>JAVA SCRIPT</li>
    </ul>

    <h2>Definition list:</h2>
    <dl>
        <dt>HTML</dt>
        <dd>- hyper text markup language</dd>

        <dt>JS</dt>
        <dd>- Java Script</dd>
    </dl>
</body>

</html>
